<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify UI Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <aside class="sidebar">
        <div class="logo">
            <img src="spotify.jpg" alt="Spotify Logo">
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Search</a></li>
                <li><a href="#">Library</a></li>
            </ul>
        </nav>
    </aside>
    <main class="main">
        <h1>Trending Songs</h1>
        <div class="songs">
            <div class="card">
                <img src="starboy.png" alt="Starboy">
                <h3>Starboy</h3>
                <p>The Weeknd</p>
            </div>
            <div class="card">
                <img src="levitating.jpg" alt="Levitating">
                <h3>Levitating</h3>
                <p>Dua Lipa</p>
            </div>
            <div class="card">
                <img src="onedance.jpg" alt="One Dance">
                <h3>One Dance</h3>
                <p>Drake</p>
            </div>
            <div class="card">
                <img src="saveyourtears.jpg" alt="Save Your Tears">
                <h3>Save Your Tears</h3>
                <p>The Weeknd</p>
            </div>
        </div>
    </main>
</div>
<footer class="player">
    <p>Now Playing 🎵</p>
</footer>
</body>
</html>
