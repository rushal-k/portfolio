<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Masonry Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Pinterest Masonry Grid</h1>
        <p>My Favorite Things</p>
    </header>
    <section class="gallery">
        <div class="card">
            <img src="img/gym.jpg">
            <h3>Gym</h3>
        </div>
        <div class="card">
            <img src="img/spidy.jpg">
            <h3>Spider-Man</h3>
        </div>
        <div class="card">
            <img src="img/luffy.jpg">
            <h3>Monkey D Luffy</h3>
        </div>
        <div class="card">
            <img src="img/vrindavan.jpg">
            <h3>Vrindavan</h3>
        </div>
        <div class="card">
            <img src="img/kohli.jpg">
            <h3>Virat Kohli</h3>
        </div>
        <div class="card">
            <img src="img/nature.jpg">
            <h3>Nature</h3>
        </div>
        <div class="card">
            <img src="img/porsche.jpg">
            <h3>Porsche</h3>
        </div>
        <div class="card">
            <img src="img/technology.jpg">
            <h3>Technology</h3>
        </div>
    </section>
</body>
</html>
