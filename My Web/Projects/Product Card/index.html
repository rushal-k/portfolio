<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="PC">
        <div class="rating">
            <span class="stars">⭐ ⭐ ⭐ ⭐</span>

        <p>Apple's latest flagship smartphone with a powerful processor, stunning display, and advanced camera system designed for performance and creativity.</p>
        <h4>$1199</h4>
        <button>Add to Cart</button>
    </div>
</body>
</html>
